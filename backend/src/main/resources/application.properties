spring.application.name=backend
# ==========================================
# CONFIGURACIÓN DEL SERVIDOR
# ==========================================
server.port=8080
server.servlet.context-path=/

# ==========================================
# CONFIGURACIÓN DE LA BASE DE DATOS (Ejemplo con PostgreSQL)
# ==========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# CONFIGURACIÓN DE JPA / HIBERNATE (ORM)
# ==========================================
# 'update' analiza tus clases @Entity y crea o modifica las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
# Muestra las consultas SQL reales en la consola (crucial para auditoría y desarrollo)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# CONFIGURACIÓN DE ACTUATOR (Monitoreo & Devops)
# ==========================================
# Expone los endpoints web para revisar la salud de la app y métricas de rendimiento
management.endpoints.web.exposure.include=health,info,metrics
# Muestra detalles extendidos (como el estado de la conexión a la BD) en /actuator/health
management.endpoint.health.show-details=always